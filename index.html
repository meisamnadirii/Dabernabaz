<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>پارس دبرنا - تالار VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');

        :root {
            --gold: linear-gradient(180deg, #ffe0a3 0%, #d4af37 50%, #8c6d1d 100%);
            --red-panel: linear-gradient(180deg, #a01a1a 0%, #600505 100%);
            --shadow: 0 10px 20px rgba(0,0,0,0.7);
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0c0203; color: #fff; overflow-x: hidden;
        }

        /* پس‌زمینه اختصاصی کازینویی با کارت‌های دبرنا */
        .main-wrapper {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url('https://img.freepik.com/premium-photo/luxury-casino-interior-with-bingo-cards-balls-table_1025550-1254.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        /* --- هدر پروفایل (دقیقاً مشابه عکس) --- */
        .profile-header {
            width: 100%;
            background: var(--red-panel);
            border: 3px solid #d4af37;
            border-radius: 25px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow), inset 0 0 15px rgba(212,175,55,0.3);
            margin-bottom: 20px;
            position: relative;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar-box {
            width: 65px; height: 65px;
            background: #4a0707; border: 2px solid #d4af37;
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 10px;
        }
        .avatar-box span { font-size: 30px; }

        .user-details b { font-size: 18px; color: #fff; display: block; }
        
        .balance-box {
            background: rgba(0,0,0,0.4); border: 2px solid #d4af37;
            border-radius: 12px; padding: 5px 15px; display: flex;
            align-items: center; gap: 8px; color: #fff; font-weight: 900;
        }

        /* --- لوگوی وسط --- */
        .center-logo {
            width: 90px; height: 90px;
            margin: 0 auto 20px auto;
            background: url('https://i.postimg.cc/8P8t6t2P/paris-logo.png') no-repeat center center/contain;
            filter: drop-shadow(0 0 10px #d4af37);
        }

        /* --- منوی دکمه‌های پیکانی (دو ستونه) --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 10px;
            margin-bottom: 30px;
        }

        .arrow-btn {
            position: relative;
            height: 55px;
            background: linear-gradient(90deg, #bd1d1d 0%, #7a0a0a 100%);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 15px;
            color: #fff;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }

        /* حالت پیکانی (Arrow Shape) */
        .arrow-left { border-radius: 40px 5px 5px 40px; border-right: none; }
        .arrow-right { border-radius: 5px 40px 40px 5px; border-left: none; }

        .arrow-btn:active { transform: scale(0.95); filter: brightness(1.2); }

        /* --- دکمه عظیم شروع بازی --- */
        .start-game-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: auto;
            padding-bottom: 20px;
        }

        .main-trigger {
            width: 100%;
            max-width: 320px;
            height: 100px;
            background: var(--red-panel);
            border: 4px solid #d4af37;
            border-radius: 100px;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .main-trigger span {
            font-size: 32px;
            font-weight: 900;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .laurel-wreath {
            position: absolute;
            width: 110%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            top: 50%; transform: translateY(-50%);
        }
        .leaf { width: 60px; height: 80px; background: url('https://cdn-icons-png.flaticon.com/512/2619/2619247.png') no-repeat center center/contain; filter: sepia(1) saturate(5) brightness(0.8); }
        .leaf.right { transform: scaleX(-1); }

        /* --- فوتر (میز دبرنا) --- */
        .table-footer {
            width: 100%;
            height: 180px;
            background: url('https://i.postimg.cc/mD8zYv8N/table-cards.png') no-repeat center bottom/cover;
            margin-top: -40px;
        }

    </style>
</head>
<body>

    <div class="main-wrapper" id="appBody">
        
        <!-- هدر پروفایل کاربر -->
        <div class="profile-header">
            <div class="user-info">
                <div class="avatar-box">
                    <span>👤</span
                    <b>پروفایل</b>
                </div>
                <div class="user-details">
                    <b id="displayUser">meisamnadiri</b>

            </div>
            <div class="balance-box">
                <span style="font-size: 20px;">💵</span>
                <span id="balance">۱۳۱,۰۰۰</span>

        </div>

        <!-- لوگوی کوچک پاریس -->
        <div class="center-logo"></div

        <!-- منوی دکمه‌های دو ستونه پیکانی -->
        <div class="menu-grid">
            <div class="arrow-btn arrow-right">واریز و شارژ</div>
            <div class="arrow-btn arrow-left">برداشت وجه</div>
            <div class="arrow-btn arrow-right">گردونه شانس</div>
            <div class="arrow-btn arrow-left">گزارشات</div>
            <div class="arrow-btn arrow-right">تماس با ما</div>
            <div class="arrow-btn arrow-left">قوانین و مقررات</div>
        </div>

        <!-- دکمه بزرگ شروع بازی -->
        <div class="start-game-container">
            <div class="laurel-wreath">
                <div class="leaf"></div>
                <div class="leaf right"></div>
            </div>
            <div class="main-trigger" onclick="alert('در حال اتصال به میز بازی...')">
                <span>شـروع بـازی</span>
            </div>
        </div>
